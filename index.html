<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GOOGLE ICONS -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;

    /* Coloque aqui o caminho da sua foto */
    background-image: url('./Wallpaper.png');

    background-size: cover;      /* cobre toda a tela */
    background-position: center; /* centraliza */
    background-repeat: no-repeat;
    background-attachment: fixed;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* Caixa Login */
.login-box{
    background: rgba(255, 255, 255, 0);
    backdrop-filter: blur(4px);
    width:360px;
    padding:35px;
    border-radius:5px;
    text-align:center;
    
    animation:aparecer .6s ease;
    
}

/* Foto do Coelhinho */
.bunny{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid #ffc8dd;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(255,192,203,.4);
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    color:#ff69a6;
    margin-bottom:25px;
    font-size:28px;
    font-weight:600;
}

/* Inputs */
.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:14px 45px 14px 15px;
    border:none;
    border-radius:4px;
    background:#fff5f8;
    color:#666;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    outline:none;
    box-shadow:0 0 0 3px #ffc8dd;
}

.input-group span{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    color:#ff7eb6;
    cursor:pointer;
}

/* Botão */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:4px;
    background:linear-gradient(135deg,#ff8fab,#ffb3c6);
    color:white;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(255,143,171,.4);
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(255,143,171,.6);
}

button svg{
    fill:white;
}

/* Erro */
.erro{
    color:#ff5c8a;
    margin-top:12px;
    display:none;
    font-size:14px;
    font-weight:500;
}
</style>

</head>

<body>

<div class="login-box">
    

    <div class="input-group">
        <input type="password" id="senha" placeholder="*******">
        <span class="material-symbols-outlined" onclick="toggleSenha()">visibility</span>
    </div>

    <button onclick="logar()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
        <path d="M440-160v-487L216-423l-56-57 320-320 320 320-56 57-224-224v487h-80Z"/></svg></button>

    <div class="erro" id="erro">Senha incorreta</div>
</div>

<script>
// 🔑 HASH
const senhaHashCorreta = "0788979fc9366e21cd56311511b897a222cf91711481bcd7dc837eac2172d087";

async function gerarHash(texto) {
    const encoder = new TextEncoder();
    const data = encoder.encode(texto);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function logar() {
    const senha = document.getElementById("senha").value.trim();
    const hash = await gerarHash(senha);

    if (hash === senhaHashCorreta) {
        window.location.href = "dgmdtjjyrenm.html";
    } else {
        document.getElementById("erro").style.display = "block";
    }
}

/* MOSTRAR / ESCONDER SENHA */
function toggleSenha() {
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
