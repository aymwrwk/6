<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GOOGLE ICONS -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX */
.login-box {
    background: #111;
    padding: 40px;
    width: 320px;
    text-align: center;
    border-radius: 8px;
    animation: aparecer 0.6s ease;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    margin-bottom: 25px;
    color: #fff;
    font-weight: 600;
}

/* INPUT */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 12px 45px 12px 15px;
    background: #000;
    border: 1px solid #353434ab;
    color: #fff;
    outline: none;
    border-radius: 4px;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #ff0000;
    box-shadow: 0 0 8px rgba(255,0,0,0.3);
}

/* ÍCONE */
.input-group span {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #c2b9b9;
    cursor: pointer;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #cc0000);
    color: white;
    cursor: pointer;
    border-radius: 4px;
    transition: 0.3s;
    font-weight: 500;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 12px rgba(255,0,0,0.5);
}

/* ERRO */
.erro {
    color: #ff4d4d;
    margin-top: 12px;
    display: none;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <div class="input-group">
        <input type="password" id="senha" placeholder="*******">
        <span class="material-symbols-outlined" onclick="toggleSenha()">visibility</span>
    </div>

    <button onclick="logar()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
        <path d="M440-160v-487L216-423l-56-57 320-320 320 320-56 57-224-224v487h-80Z"/></svg></button>

    <div class="erro" id="erro">Senha incorreta</div>
</div>

<script>
// 🔑 HASH
const senhaHashCorreta = "0788979fc9366e21cd56311511b897a222cf91711481bcd7dc837eac2172d087";

async function gerarHash(texto) {
    const encoder = new TextEncoder();
    const data = encoder.encode(texto);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function logar() {
    const senha = document.getElementById("senha").value.trim();
    const hash = await gerarHash(senha);

    if (hash === senhaHashCorreta) {
        window.location.href = "Q7mZx2A9pL4bV8tN5eR1yC6uF3wH0sJkDgI8oP2XzM9aB4cT7U1vE5Y6rQ3nL0KjHfS.html";
    } else {
        document.getElementById("erro").style.display = "block";
    }
}

/* MOSTRAR / ESCONDER SENHA */
function toggleSenha() {
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
