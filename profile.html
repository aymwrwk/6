<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>♡ Nosso Cantinho ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f8f1f4;
    font-family:'Quicksand',sans-serif;
    color:#9c7f89;
    padding:30px;
}

/* FLORES */
.flower{
    position:fixed;
    font-size:50px;
    opacity:.3;
    pointer-events:none;
}

.f1{top:10px;left:10px;}
.f2{top:10px;right:10px;}
.f3{bottom:10px;left:50%;}
.f4{bottom:10px;right:10px;}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    z-index:9999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    margin-bottom:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(255,182,193,.25);
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#d889a7;
}

.menu{
    display:flex;
    gap:10px;
}

.menu a{
    text-decoration:none;
    color:#8f7f89;
    padding:10px 14px;
    border-radius:12px;
    transition:.3s;
}

.menu a:hover{
    background:#ffd9e6;
}

.menu-btn{
    display:none;
    font-size:30px;
    background:none;
    border:none;
    color:#ffc0d8;
    cursor:pointer;
}

/* CONTEÚDO */
.content{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:260px 1fr;
    gap:30px;
}

/* SIDEBAR */
.sidebar{
    background:#fdeef4;
    padding:20px;
    border-radius:20px;
    height:fit-content;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#8f7f89;
    padding:10px;
    margin-bottom:8px;
    border-radius:12px;
    transition:.3s;
}

.sidebar a:hover{
    background:#ffd9e6;
}

/* MAIN */
.main{
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* CARROSSEL */
.carousel{
    position:relative;
    background:#fff7fa;
    border:2px solid #ffdbe7;
    border-radius:25px;
    padding:15px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.carousel img{
    width:100%;
    max-height:500px;
    object-fit:cover;
    border-radius:18px;
}

/* BOTÕES */
.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:#ffd9e6;
    color:#c77293;
    cursor:pointer;
    font-size:22px;
}

.prev{left:20px;}
.next{right:20px;}

/* DOTS */
.dots{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#ffd0df;
    cursor:pointer;
}

.dot.active{
    background:#d986a7;
}

/* TEXTO */
.about{
    padding:30px;
    border-radius:25px;
    background:
        linear-gradient(
            90deg,
            rgba(255,192,203,.12) 1px,
            transparent 1px
        ),
        linear-gradient(
            rgba(255,192,203,.12) 1px,
            transparent 1px
        );

    background-size:30px 30px;
}

.about p{
    line-height:1.9;
    font-size:17px;
}

/* RESPONSIVO */
@media(max-width:900px){

    .content{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .menu-btn{
        display:block;
    }

    .menu{
        display:none;
        position:absolute;
        top:80px;
        left:15px;
        right:15px;

        flex-direction:column;
        background:white;
        padding:15px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,.08);
    }

    .menu.active{
        display:flex;
    }
}

</style>
</head>

<body>

<div class="flower f3">🌸</div>
<div class="flower f4">🌸</div>

<!-- NAVBAR (CORRETO AGORA FORA DA SIDEBAR) -->
<div class="navbar">

    <div class="logo"></div>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="menu" id="menu">
        <a href="./dgmdtjjyrenm.html">Home</a>
        <a href="./profile.html">Profile</a>
        <a href="#">Textos</a>
        <a href="#">Galeria</a>
    </div>

</div>

<!-- CONTEÚDO -->
<div class="content">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <a href="#">Home</a>
        <a href="./profile.html">Profile</a>
        <a href="#">Textos</a>
        <a href="#">Galeria</a>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div>

            <div class="carousel">

                <button class="btn prev" onclick="trocarFoto(-1)">❮</button>

                <img id="foto" src="./Lara1.png">

                <button class="btn next" onclick="trocarFoto(1)">❯</button>

            </div>

            <div class="dots">
                <div class="dot active" onclick="irPara(0)"></div>
                <div class="dot" onclick="irPara(1)"></div>
                <div class="dot" onclick="irPara(2)"></div>
                <div class="dot" onclick="irPara(3)"></div>
            </div>

        </div>

        <div class="about">

            <p>
                você ainda não sabe o quanto eu te acho bonita,
                ao ponto de querer criar essa página só para te ver :)
            </p>

        </div>

    </main>

</div>

<script>

/* MENU MOBILE */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

/* CARROSSEL */
const fotos = [
    "./lara2.jpg",
    "./lara1.png",
    "./lara4.jpg",
    "./lara5.jpg"
];

let atual = 0;

const imagem = document.getElementById("foto");
const dots = document.querySelectorAll(".dot");

function atualizar(){
    imagem.src = fotos[atual];

    dots.forEach(dot=>{
        dot.classList.remove("active");
    });

    dots[atual].classList.add("active");
}

function trocarFoto(d){
    atual += d;

    if(atual < 0) atual = fotos.length - 1;
    if(atual >= fotos.length) atual = 0;

    atualizar();
}

function irPara(i){
    atual = i;
    atualizar();
}

setInterval(()=> trocarFoto(1), 5000);

</script>

</body>
</html>
