<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bunny's Paradise ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Quicksand',sans-serif;

    background:
        linear-gradient(90deg, rgba(255,192,203,.12) 1px, transparent 1px),
        linear-gradient(rgba(255,192,203,.12) 1px, transparent 1px);

    background-size:30px 30px;

    color:#8f6c79;
}

/* FLORES */
.flower{
    position:fixed;
    font-size:45px;
    opacity:.25;
    pointer-events:none;
}

.f1{top:10px;left:10px;}
.f2{top:10px;right:10px;}
.f3{bottom:10px;left:50%;}
.f4{bottom:10px;right:10px;}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    z-index:998;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 20px;
    margin:15px;

    background:rgba(255,255,255,.85);
    backdrop-filter:blur(12px);
}

#icon{
    font-size:34px;
    color: #f3b4cc;
}

.logo{
    font-size:18px;
    font-weight:600;
    color:#222;
}

/* BOTÃO MENU */
.menu-btn{
    background:none;
    border:none;
    cursor:pointer;
    color:#222;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(3px);

    opacity:0;
    pointer-events:none;
    transition:.25s ease;

    z-index:999;
}

.overlay.active{
    opacity:1;
    pointer-events:auto;
}

/* MENU LATERAL */

/* MENU LATERAL */
   .side-menu{
    
    font-family: 'Plus Jakarta Sans', sans-serif;

    position:fixed;
    top:0;
    left:0;
    height:100%;
    width:280px;

    background:
        linear-gradient(
            rgba(255,255,255,.05),
            rgba(255,255,255,.05)
        ),
        url("./side.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    backdrop-filter:blur(10px);

    border-right:1px solid rgba(255,255,255,.3);

    padding:25px;

    display:flex;
    flex-direction:column;

     justify-content:center; /* centraliza verticalmente */
    padding-bottom:120px;      /* ⭐ controla altura do bloco */

    gap:14px;

    transform:translateX(-105%);
    transition:.35s cubic-bezier(.4,0,.2,1);

    z-index:1000;
}
.side-menu.active{
    transform:translateX(0);
}

.side-menu a{
    display:flex;
    align-items:center;
    justify-content:center;

    gap:10px;

    text-decoration:none;

    color:#ff7aa2;

    font-size:18px;
    font-weight:500;

    padding:16px 18px;

    border-radius:16px;

    opacity:0;
    transform:translateX(-10px);
    transition:.3s ease;
}
/* ANIMAÇÃO STAGGER */
.side-menu.active a{
    opacity:1;
    transform:translateX(0);
    transition-delay: calc(var(--i) * 0.08s);
}

/* HOVER */
.side-menu a:hover{
    background:#f3f3f3;
}

.material-symbols-outlined{
    font-size:52px;
    color:#ff9bb8;
    text-shadow:0 0 10px rgba(255,182,193,.4);
}
/* MAIN */
.main{
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* CARROSSEL */
.carousel{
    position:relative;
    background:#fff7fa;
    border:2px solid #ffdbe7;
    border-radius:25px;
    padding:15px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.carousel img{
    width:100%;
    max-height:500px;
    object-fit:cover;
    border-radius:18px;
}

/* BOTÕES */
.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:#ffd9e6;
    color:#c77293;
    cursor:pointer;
    font-size:22px;
}

.prev{left:20px;}
.next{right:20px;}

/* DOTS */
.dots{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#ffd0df;
    cursor:pointer;
}

.dot.active{
    background:#d986a7;
}

/* ABOUT */
.about{
    padding:30px;
    border-radius:25px;
}

.about p{
    line-height:1.9;
    font-size:17px;
}

strong{
    background:rgb(255,236,243);
    padding:2px 6px;
    font-weight:normal;
}

/* RESPONSIVO */
@media(max-width:900px){

    .header h1{
        font-size:32px;
    }

    .banner{
        height:300px;
    }
}

</style>
</head>

<body>

<!-- FLORES -->
<div class="flower f1">🌸</div>
<div class="flower f2">🌸</div>
<div class="flower f3">🌸</div>
<div class="flower f4">🌸</div>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo"></div>

    <button class="menu-btn" onclick="toggleMenu()">
        <span class="material-symbols-outlined" id="icon">menu</span>
    </button>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- MENU LATERAL -->
<div class="side-menu" id="menu">

    <a href="./dgmdtjjyrenm.html" style="--i:1">
        <span class="material-symbols-outlined">home</span>
    </a>

    <a href="textos.html" style="--i:3">
        <span class="material-symbols-outlined">article</span>
    </a>

</div>

<!-- MAIN -->
    <main class="main">

        <div>

            <div class="carousel">

                <button class="btn prev" onclick="trocarFoto(-1)">❮</button>

                <img id="foto" src="./Lara1.png">

                <button class="btn next" onclick="trocarFoto(1)">❯</button>

            </div>

            <div class="dots">
                <div class="dot active" onclick="irPara(0)"></div>
                <div class="dot" onclick="irPara(1)"></div>
                <div class="dot" onclick="irPara(2)"></div>
                <div class="dot" onclick="irPara(3)"></div>
            </div>

        </div>

        <div class="about">

            <p>
                você ainda não sabe o quanto eu te acho bonita,
                ao ponto de querer criar essa página só para te ver :)
            </p>
<br><br>
        </div>

    </main>
<script>

/* MENU MOBILE */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

/* CARROSSEL */
const fotos = [
    "./lara2.jpg",
    "./lara1.png",
    "./lara4.jpg",
    "./lara5.jpg"
];

let atual = 0;

const imagem = document.getElementById("foto");
const dots = document.querySelectorAll(".dot");

function atualizar(){
    imagem.src = fotos[atual];

    dots.forEach(dot=>{
        dot.classList.remove("active");
    });

    dots[atual].classList.add("active");
}

function trocarFoto(d){
    atual += d;

    if(atual < 0) atual = fotos.length - 1;
    if(atual >= fotos.length) atual = 0;

    atualizar();
}

function irPara(i){
    atual = i;
    atualizar();
}

setInterval(()=> trocarFoto(1), 5000);

</script>
<script>

function toggleMenu(){

    const menu = document.getElementById("menu");
    const overlay = document.getElementById("overlay");
    const icon = document.getElementById("icon");

    menu.classList.toggle("active");
    overlay.classList.toggle("active");

    if(menu.classList.contains("active")){
        icon.textContent = "close";
    } else {
        icon.textContent = "menu";
    }
}

</script>

</body>
</html>
